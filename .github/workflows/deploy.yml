name: Deploy Edenred App to ACA
on:
  push:
    branches: [ "main" ] # Triggers only on pushes to your main branch

permissions:
  id-token: write # Required for the OIDC handshake
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and Deploy to ACA
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          resourceGroup: abir_rg_5343
          containerAppName: edenred-test-app
          # This creates a 'Managed Environment' if one doesn't exist
          location: eastus
